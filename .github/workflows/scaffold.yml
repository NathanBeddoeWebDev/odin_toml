name: scaffold

on:
  push:
  pull_request:

jobs:
  declarations:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Build pinned Reference Odin
        shell: bash
        run: |
          set -euo pipefail
          revision=$(awk -F'"' '/^revision = / {print $2}' toolchain/odin.lock)
          source=$(awk -F'"' '/^source = / {print $2}' toolchain/odin.lock)
          git clone --filter=blob:none "$source" "$RUNNER_TEMP/Odin"
          git -C "$RUNNER_TEMP/Odin" fetch --depth=1 origin "$revision"
          git -C "$RUNNER_TEMP/Odin" checkout --detach "$revision"
          (cd "$RUNNER_TEMP/Odin" && ./build_odin.sh release-native)
          echo "$RUNNER_TEMP/Odin" >> "$GITHUB_PATH"
      - name: Prepare pinned test-only dependencies
        run: scripts/prepare_test_dependencies.sh
      - name: Compile public packages and external consumers
        run: scripts/check.sh
      - name: Reproduce open RTTI-disabled design gate
        run: scripts/probe_no_rtti.sh
      - name: Print compiler environment
        if: always()
        run: test ! -f build/reports/compiler.txt || cat build/reports/compiler.txt

  float-format-platforms:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: linux_amd64
          - runner: ubuntu-24.04-arm
            target: linux_arm64
          - runner: macos-15-intel
            target: darwin_amd64
          - runner: macos-15
            target: darwin_arm64
          - runner: windows-2025
            target: windows_amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check out pinned Reference Odin
        shell: bash
        run: |
          set -euo pipefail
          revision=$(awk -F'"' '/^revision = / {print $2}' toolchain/odin.lock)
          source=$(awk -F'"' '/^source = / {print $2}' toolchain/odin.lock)
          git clone --filter=blob:none "$source" "$RUNNER_TEMP/Odin"
          git -C "$RUNNER_TEMP/Odin" fetch --depth=1 origin "$revision"
          git -C "$RUNNER_TEMP/Odin" checkout --detach "$revision"
      - name: Build pinned Reference Odin
        if: runner.os != 'Windows'
        shell: bash
        run: (cd "$RUNNER_TEMP/Odin" && ./build_odin.sh release-native)
      - name: Build pinned Reference Odin on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: cd /d "%RUNNER_TEMP%\Odin" && call build.bat release
      - name: Add Reference Odin to PATH
        shell: bash
        run: echo "$RUNNER_TEMP/Odin" >> "$GITHUB_PATH"
      - name: Prepare pinned test-only oracle
        shell: bash
        env:
          CC: ${{ runner.os == 'Windows' && 'clang' || 'cc' }}
        run: scripts/prepare_test_dependencies.sh
      - name: Run binary64 formatting gate
        shell: bash
        run: |
          set -euo pipefail
          test "$(odin version)" = "odin version $(awk -F'"' '/^version = / {print $2}' toolchain/odin.lock)"
          printf 'running binary64 format gate for %s\n' "${{ matrix.target }}"
          common=(-vet -vet-style -warnings-as-errors)
          for mode in minimal speed; do
            odin test tests/float_format "-o:$mode" "${common[@]}" \
              -define:TOML_BINARY64_FORMAT_GATE_TESTING=true \
              -define:TOML_DECIMAL_GATE_TESTING=true \
              -define:ODIN_TEST_THREADS=1 \
              -define:ODIN_TEST_RANDOM_SEED=123456789 \
              -define:ODIN_TEST_FAIL_ON_BAD_MEMORY=true
          done
          scripts/check_float_format_oracle.sh
