name: scaffold

on:
  push:
  pull_request:

jobs:
  declarations:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          submodules: recursive
      - name: Build pinned Reference Odin
        shell: bash
        run: |
          set -euo pipefail
          revision=$(awk -F'"' '/^revision = / {print $2}' toolchain/odin.lock)
          source=$(awk -F'"' '/^source = / {print $2}' toolchain/odin.lock)
          git clone --filter=blob:none "$source" "$RUNNER_TEMP/Odin"
          git -C "$RUNNER_TEMP/Odin" fetch --depth=1 origin "$revision"
          git -C "$RUNNER_TEMP/Odin" checkout --detach "$revision"
          (cd "$RUNNER_TEMP/Odin" && ./build_odin.sh release-native)
          echo "$RUNNER_TEMP/Odin" >> "$GITHUB_PATH"
      - name: Set up Go
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a
        with:
          go-version: stable
      - name: Prepare pinned test-only dependencies
        run: scripts/prepare_test_dependencies.sh
      - name: Compile public packages and external consumers
        run: scripts/check.sh
      - name: Print compiler environment
        if: always()
        run: test ! -f build/reports/compiler.txt || cat build/reports/compiler.txt

  platform-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: linux_amd64
          - runner: ubuntu-24.04-arm
            target: linux_arm64
          - runner: macos-15-intel
            target: darwin_amd64
          - runner: macos-15
            target: darwin_arm64
          - runner: windows-2025
            target: windows_amd64
    runs-on: ${{ matrix.runner }}
    env:
      MATRIX_TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          submodules: recursive
      - name: Check out pinned Reference Odin
        shell: bash
        run: |
          set -euo pipefail
          revision=$(awk -F'"' '/^revision = / {print $2}' toolchain/odin.lock)
          source=$(awk -F'"' '/^source = / {print $2}' toolchain/odin.lock)
          git clone --filter=blob:none "$source" "$RUNNER_TEMP/Odin"
          git -C "$RUNNER_TEMP/Odin" fetch --depth=1 origin "$revision"
          git -C "$RUNNER_TEMP/Odin" checkout --detach "$revision"
      - name: Build pinned Reference Odin
        if: runner.os != 'Windows'
        shell: bash
        run: (cd "$RUNNER_TEMP/Odin" && ./build_odin.sh release-native)
      - name: Build pinned Reference Odin on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: cd /d "%RUNNER_TEMP%\Odin" && call build.bat release
      - name: Add Reference Odin to PATH
        shell: bash
        run: echo "$RUNNER_TEMP/Odin" >> "$GITHUB_PATH"
      - name: Set up Go
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a
        with:
          go-version: stable
      - name: Prepare pinned test-only dependencies
        shell: bash
        env:
          CC: ${{ runner.os == 'Windows' && 'clang' || 'cc' }}
        run: scripts/prepare_test_dependencies.sh
      - name: Run complete normal and speed public suite
        shell: bash
        run: scripts/run_public_suite.sh
      - name: Run AddressSanitizer aggregate fuzz campaign
        shell: bash
        run: scripts/run_sanitizer_fuzz.sh --target "${{ matrix.target }}" --duration 300
      - name: Upload platform reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: reports-${{ matrix.target }}
          path: build/reports/
          if-no-files-found: error

  thread-sanitizer:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          submodules: recursive
      - name: Build pinned Reference Odin
        shell: bash
        run: |
          set -euo pipefail
          revision=$(awk -F'"' '/^revision = / {print $2}' toolchain/odin.lock)
          source=$(awk -F'"' '/^source = / {print $2}' toolchain/odin.lock)
          git clone --filter=blob:none "$source" "$RUNNER_TEMP/Odin"
          git -C "$RUNNER_TEMP/Odin" fetch --depth=1 origin "$revision"
          git -C "$RUNNER_TEMP/Odin" checkout --detach "$revision"
          (cd "$RUNNER_TEMP/Odin" && ./build_odin.sh release-native)
          echo "$RUNNER_TEMP/Odin" >> "$GITHUB_PATH"
      - name: Run frozen-registry concurrent reads under ThreadSanitizer
        shell: bash
        run: scripts/check_thread_sanitizer.sh --target linux_amd64
      - name: Upload ThreadSanitizer report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: reports-linux-amd64-thread-sanitizer
          path: build/reports/thread-sanitizer.*
          if-no-files-found: error

  release-evidence:
    needs: [declarations, platform-matrix, thread-sanitizer]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Download native platform and sanitizer reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: reports-*
          path: build/release-reports
      - name: Assemble reviewed release bundle
        run: |
          scripts/assemble_release_bundle.py assemble \
            --reports-root build/release-reports \
            --output build/release-bundle \
            --source-revision "$GITHUB_SHA" \
            --run-id "$GITHUB_RUN_ID"
      - name: Upload reviewed release bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-bundle
          path: build/release-bundle/
          if-no-files-found: error
